---
# yamllint disable rule:line-length
name: build-test
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-test:
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist files exist
        run: |
          test -f dist/edible-wc.js || (echo "dist/edible-wc.js not found" && exit 1)
          test -f dist/edible-wc.esm.js || (echo "dist/edible-wc.esm.js not found" && exit 1)
          echo "✅ Build artifacts verified"

      - name: Run tests
        run: npm test
